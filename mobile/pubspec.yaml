name: hanguk_app
description: Hanguk Academy DRM Cross-Platform App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Provides WebView capabilities to wrap the Vercel web app
  webview_flutter: ^4.4.2
  # Provides secure window management (FLAG_SECURE wrapper)
  flutter_windowmanager: ^0.2.0
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
